      <div style="padding: 20px; font-family: sans-serif; background-color: #090d24; color: #f8fafc;">
        <h1>PrepTrack — Ultimate IIT JEE Preparation Tracker & Study Console</h1>
        <p>
          Welcome to PrepTrack, the leading self-study companion and tracker for engineering aspirants preparing for the <strong>IIT JEE Main</strong> and <strong>JEE Advanced</strong> entrance exams.
        </p>
        
        <h2>Core JEE Preparation Features:</h2>
        <ul>
          <li><strong>Syllabus Progress Tracker:</strong> Detailed, chapter-by-chapter curriculum tracking for Physics, Chemistry, and Mathematics (Calculus, Algebra, Coordinate Geometry, Mechanics, Thermodynamics, Organic Chemistry, Inorganic Chemistry, Physical Chemistry).</li>
          <li><strong>Interactive JEE Error Book / Mistake Log:</strong> Log difficult questions, careless mistakes, conceptual gaps, and attach formulas, tags, and notes to avoid repeating errors in mock exams.</li>
          <li><strong>Daily Practice Problem Counter:</strong> Log how many physics, chemistry, and maths questions you solve daily to maintain high consistency.</li>
          <li><strong>Pomodoro Study Timer:</strong> Stay focused during long study sessions with customizable intervals, audio study tones, and offline tracking.</li>
          <li><strong>Mock Test Score Analytics:</strong> Record, visualize, and analyze your scores in Full Syllabus or Part Syllabus JEE mock tests with interactive graphs.</li>
        </ul>

        <h2>Frequently Tracked JEE Chapters:</h2>
        <h3>Physics:</h3>
        <p>Rotational Mechanics, Laws of Motion, Electrostatics, Current Electricity, Optics, Modern Physics, Thermodynamics, Waves & Oscillations, Gravitation.</p>
        
        <h3>Chemistry:</h3>
        <p>Chemical Bonding, Coordination Compounds, Gaseous State, Electrochemistry, Organic Synthesis, Reaction Mechanisms (SN1, SN2, Electrophilic Substitution), Biomolecules, Periodic Table, Chemical Kinetics.</p>
        
        <h3>Mathematics:</h3>
        <p>Definite Integrals, Limits & Continuity, Complex Numbers, Matrices & Determinants, Vectors & 3D Geometry, Quadratic Equations, Permutations & Combinations, Probability.</p>
